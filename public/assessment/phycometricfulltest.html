<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Compass · Career Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;700;800;900&family=Source+Sans+3:wght@400;600;700&family=IBM+Plex+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#9C2A1F; --red-deep:#7A1F16; --ink:#211B19; --steel:#6E7075; --silver:#B7BAC0;
  --paper:#F2F4F6; --card:#FFFFFF; --line:#DEE2E6;
  --gold:#C98A2C; --slate:#3B5166; --sage:#5C7A5E; --plum:#7A4866;
  --good:#9C2A1F; --mid:#C98A2C; --grow:#6E7075;
}
*{box-sizing:border-box; margin:0; padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Source Sans 3',system-ui,sans-serif; background:var(--paper); color:var(--ink); line-height:1.55;}
h1,h2,h3,.display{font-family:'Big Shoulders Display',sans-serif;}
.mono{font-family:'IBM Plex Mono',monospace;}

.wrap{max-width:920px; margin:0 auto; padding:0 20px 90px;}
img{max-width:100%; display:block;}

/* ---------- top bar / route rail ---------- */
.topbar{position:sticky; top:0; z-index:50; background:rgba(242,244,246,.96); backdrop-filter:blur(6px); border-bottom:1px solid var(--line); padding:12px 20px 12px;}
.topbar-inner{max-width:920px; margin:0 auto;}
.brandrow{display:flex; justify-content:space-between; align-items:center; gap:14px;}
.brandrow .logo{height:30px; width:auto;}
.stage{font-family:'IBM Plex Mono',monospace; font-size:.72rem; color:var(--steel); text-transform:uppercase; letter-spacing:.08em;}

.route{position:relative; height:30px; margin-top:10px;}
.route .track{position:absolute; left:14px; right:14px; top:14px; height:3px; background:var(--line); border-radius:2px;}
.route .fill{position:absolute; left:14px; top:14px; height:3px; background:linear-gradient(90deg,var(--red),var(--gold)); border-radius:2px; transition:width .35s ease;}
.route .pins{position:absolute; left:0; right:0; top:0; display:flex; justify-content:space-between;}
.route .pin{width:28px; height:28px; display:flex; align-items:center; justify-content:center;}
.route .pin .dot{width:13px; height:13px; border-radius:50%; background:var(--card); border:2.5px solid var(--silver); transition:all .2s ease;}
.route .pin.done .dot{background:var(--red); border-color:var(--red);}
.route .pin.now .dot{background:var(--gold); border-color:var(--gold); width:16px; height:16px; box-shadow:0 0 0 4px rgba(201,138,44,.25);}
.route .pinlabel{position:absolute; top:30px; font-size:.6rem; color:var(--steel); white-space:nowrap; transform:translateX(-50%); display:none;}
@media(min-width:640px){ .route .pinlabel{display:block;} .route{height:44px;} }

/* ---------- screens ---------- */
.screen{display:none; animation:fadeUp .35s ease;}
.screen.active{display:block;}
@keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
@media (prefers-reduced-motion: reduce){ .screen{animation:none;} }

/* ---------- welcome ---------- */
.hero{padding:48px 0 20px;}
.hero .logo-big{height:64px; margin-bottom:28px;}
.hero .eyebrow{font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:.14em; font-size:.74rem; color:var(--red); font-weight:600;}
.hero h1{font-size:clamp(2.4rem,7vw,4rem); font-weight:900; line-height:1.04; margin:.3em 0 .3em; letter-spacing:-.01em;}
.hero h1 em{font-style:normal; color:var(--red);}
.hero p.lede{font-size:1.08rem; color:var(--steel); max-width:56ch;}

.resume-banner{display:flex; justify-content:space-between; align-items:center; gap:14px; background:#FBF1E4; border:1px solid #ECD9B4; border-radius:12px; padding:14px 18px; margin:22px 0; flex-wrap:wrap;}
.resume-banner p{font-size:.9rem;}
.resume-banner b{display:block; font-family:'Big Shoulders Display'; font-size:1.05rem; font-weight:700;}

.startcard{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:28px; margin-top:24px; box-shadow:0 4px 18px rgba(33,27,25,.06);}
.field{margin-bottom:16px;}
.field label{display:block; font-weight:600; font-size:.85rem; margin-bottom:6px;}
.field input,.field select{width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px; font:inherit; background:#fff;}
.field input:focus,.field select:focus{outline:2px solid var(--gold); border-color:var(--gold);}

.routemap{display:flex; align-items:flex-start; gap:0; margin:24px 0 6px; overflow-x:auto; padding-bottom:6px;}
.routemap .stop{flex:1 1 0; min-width:108px; text-align:center; position:relative; padding-top:22px;}
.routemap .stop::before{content:""; position:absolute; top:8px; left:0; right:0; height:2px; background:var(--line);}
.routemap .stop:first-child::before{left:50%;}
.routemap .stop:last-child::before{right:50%;}
.routemap .stop .pin2{width:16px; height:16px; border-radius:50%; background:var(--red); border:2px solid var(--card); margin:0 auto; position:relative; z-index:1; box-shadow:0 0 0 2px var(--red);}
.routemap .stop b{display:block; font-family:'Big Shoulders Display'; font-weight:700; font-size:.95rem; margin-top:10px;}
.routemap .stop span{font-size:.74rem; color:var(--steel);}

/* ---------- buttons ---------- */
.btn{display:inline-block; font:inherit; font-weight:700; border:none; cursor:pointer; border-radius:99px; padding:13px 28px; transition:transform .12s ease, box-shadow .12s ease; font-family:'Source Sans 3';}
.btn:focus-visible{outline:3px solid var(--gold); outline-offset:2px;}
.btn-primary{background:var(--ink); color:#fff;}
.btn-primary:hover{transform:translateY(-1px); box-shadow:0 6px 16px rgba(33,27,25,.25);}
.btn-ghost{background:transparent; color:var(--ink); border:1.5px solid var(--ink);}
.btn-accent{background:var(--red); color:#fff;}
.btn-accent:hover{transform:translateY(-1px); box-shadow:0 6px 16px rgba(156,42,31,.3);}
.btn-outline{background:#fff; color:var(--ink); border:1.5px solid var(--line); font-weight:600; padding:10px 20px;}
.btn-sm{padding:9px 18px; font-size:.85rem;}
.navrow{display:flex; justify-content:space-between; gap:12px; margin-top:30px;}

/* ---------- section header (questions) ---------- */
.sec-head{padding:34px 0 8px;}
.sec-head .eyebrow{font-family:'IBM Plex Mono'; text-transform:uppercase; letter-spacing:.12em; font-size:.7rem; color:var(--red); font-weight:600;}
.sec-head h2{font-size:clamp(1.6rem,4vw,2.3rem); font-weight:800; margin:.2em 0 .25em;}
.sec-head p{color:var(--steel); max-width:62ch; font-size:.95rem;}

/* ---------- likert question card ---------- */
.q{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin:12px 0;}
.q.unanswered-flag{border-color:var(--red); box-shadow:0 0 0 2px rgba(156,42,31,.15);}
.q .qtext{font-weight:600; margin-bottom:12px;}
.q .qnum{color:var(--red); font-weight:800; margin-right:6px; font-family:'Big Shoulders Display';}
.likert{display:flex; gap:6px; flex-wrap:wrap;}
.likert label{flex:1 1 100px; min-width:96px; text-align:center; border:1px solid var(--line); border-radius:8px; padding:9px 6px; font-size:.78rem; cursor:pointer; background:var(--paper); transition:all .12s ease; color:var(--steel);}
.likert input{position:absolute; opacity:0; pointer-events:none;}
.likert label:hover{border-color:var(--red); color:var(--ink);}
.likert label.sel{background:var(--ink); color:#fff; border-color:var(--ink); font-weight:700;}
.likert label:has(input:focus-visible){outline:3px solid var(--gold); outline-offset:1px;}

/* ---------- MCQ ---------- */
.opts{display:grid; gap:8px;}
.opts label{display:flex; gap:10px; align-items:flex-start; border:1px solid var(--line); border-radius:8px; padding:11px 13px; font-size:.92rem; cursor:pointer; background:var(--paper); transition:all .12s ease;}
.opts input{position:absolute; opacity:0; pointer-events:none;}
.opts label:hover{border-color:var(--red);}
.opts label.sel{background:var(--ink); color:#fff; border-color:var(--ink);}
.opts .letter{font-family:'Big Shoulders Display'; font-weight:700; color:var(--red); min-width:20px;}
.opts label.sel .letter{color:var(--gold);}
.qpre{white-space:pre-line;}
.qimg{margin:0 0 12px;}
.qimg img{max-width:100%; max-height:300px; background:#fff; border:1px solid var(--line); border-radius:8px; padding:8px; margin:0 auto;}
.optimg{display:block; max-height:90px; max-width:170px; background:#fff; border-radius:6px; margin-bottom:4px;}

.errnote{display:none; color:var(--red); font-weight:700; margin-top:14px;}
.errnote.show{display:block;}

/* ===== REPORT ===== */
.report-head{padding:42px 0 6px;}
.report-head .eyebrow{font-family:'IBM Plex Mono'; text-transform:uppercase; letter-spacing:.16em; font-size:.72rem; color:var(--red); font-weight:600;}
.report-head h2{font-size:clamp(2.1rem,5.5vw,3.2rem); font-weight:900; margin:.25em 0 .12em; letter-spacing:-.01em;}
.report-meta{color:var(--steel); font-size:.92rem; font-family:'IBM Plex Mono';}

.subnav{display:flex; gap:8px; flex-wrap:wrap; margin:22px 0 8px;}
.subnav a{font-family:'IBM Plex Mono'; font-size:.72rem; text-transform:uppercase; letter-spacing:.05em; padding:8px 14px; border-radius:99px; background:var(--card); border:1px solid var(--line); color:var(--ink); text-decoration:none; font-weight:600;}
.subnav a:hover{border-color:var(--red); color:var(--red);}

.leg{margin-top:46px; padding-top:8px; border-top:3px solid var(--ink); position:relative;}
.leg .legtag{display:inline-flex; align-items:center; gap:8px; font-family:'IBM Plex Mono'; font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:#fff; background:var(--ink); padding:5px 12px 5px 9px; border-radius:0 0 8px 8px; margin-top:-1px;}
.leg .legtag .pinmini{width:7px; height:7px; border-radius:50%; background:var(--gold);}
.leg h2{font-size:clamp(1.7rem,4.5vw,2.4rem); font-weight:800; margin:14px 0 6px;}
.leg>.lede{color:var(--steel); max-width:64ch; font-size:.96rem; margin-bottom:6px;}

.holland-strip{display:flex; gap:14px; align-items:center; margin:22px 0 8px; flex-wrap:wrap;}
.tile{width:80px; height:80px; border-radius:14px; background:var(--ink); color:var(--gold); display:flex; align-items:center; justify-content:center; font-family:'Big Shoulders Display'; font-weight:900; font-size:2.4rem; box-shadow:0 6px 18px rgba(33,27,25,.25);}
.tile:nth-child(2){background:var(--red);}
.tile:nth-child(3){background:var(--slate);}
.holland-label{font-size:.92rem; color:var(--steel); max-width:34ch;}
.holland-label b{color:var(--ink);}

.rcard{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px; margin:18px 0; box-shadow:0 2px 10px rgba(33,27,25,.04);}
.rcard h3{font-size:1.2rem; font-weight:800; margin-bottom:4px; font-family:'Big Shoulders Display';}
.rcard .sub{color:var(--steel); font-size:.9rem; margin-bottom:16px;}

.cluster-row{padding:18px 0; border-top:1px solid var(--line);}
.cluster-row:first-of-type{border-top:none; padding-top:6px;}
.cluster-top{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap;}
.cluster-name{display:flex; align-items:center; gap:10px; font-family:'Big Shoulders Display'; font-weight:800; font-size:1.18rem;}
.pinbadge{width:30px; height:30px; border-radius:50% 50% 50% 4px; background:var(--red); color:#fff; display:flex; align-items:center; justify-content:center; font-family:'Big Shoulders Display'; font-weight:800; font-size:.95rem; transform:rotate(-45deg); flex:none;}
.pinbadge span{transform:rotate(45deg);}
.cluster-pct{font-weight:800; color:var(--red); font-family:'IBM Plex Mono'; font-size:1.05rem;}
.matchbar{height:9px; background:var(--paper); border-radius:5px; margin:9px 0 11px; overflow:hidden;}
.matchbar i{display:block; height:100%; border-radius:5px; background:linear-gradient(90deg,var(--red),var(--gold));}
.clusterdesc{font-size:.92rem; margin-bottom:6px;}
.whyfit{font-size:.85rem; color:var(--steel); margin-top:4px;}
.pathway{font-size:.83rem; margin-top:10px; background:var(--paper); border-radius:8px; padding:9px 12px;}
.pathway b{color:var(--red);}
.chips{display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;}
.chip{font-size:.78rem; background:var(--paper); border:1px solid var(--line); border-radius:99px; padding:4px 11px; color:var(--ink);}
details.morejobs{margin-top:8px;}
details.morejobs summary{cursor:pointer; font-size:.8rem; color:var(--red); font-weight:700; font-family:'IBM Plex Mono';}
details.morejobs .chips{margin-top:10px;}

.semcard{background:linear-gradient(165deg,#fff,#FBF6EE); border:1.5px solid #ECD9B4; border-radius:14px; padding:22px; margin-top:16px;}
.semcard h4{font-family:'Big Shoulders Display'; font-weight:800; font-size:1.05rem; margin-bottom:10px;}
.semrow{padding:11px 0; border-top:1px dashed #E3CFA0;}
.semrow:first-of-type{border-top:none;}
.semrow .top{display:flex; justify-content:space-between; font-weight:700; font-size:.92rem;}
.semrow .sig{font-size:.82rem; color:var(--steel); margin-top:3px;}

/* fit-composition donut row */
.fitcomp{display:flex; gap:22px; align-items:center; flex-wrap:wrap; margin-top:8px;}
.fitlegend{display:flex; flex-direction:column; gap:7px; font-size:.85rem;}
.fitlegend .row{display:flex; align-items:center; gap:8px;}
.swatch{width:11px; height:11px; border-radius:3px; flex:none;}

/* chart cards in section 2 */
.domain-card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:24px; margin:18px 0; box-shadow:0 2px 10px rgba(33,27,25,.04);}
.domain-card h3{font-family:'Big Shoulders Display'; font-size:1.25rem; font-weight:800;}
.domain-card .domain-desc{color:var(--steel); font-size:.9rem; margin:4px 0 18px; max-width:60ch;}
.chartrow{display:flex; gap:28px; flex-wrap:wrap; align-items:flex-start;}
.chartbox{flex:none;}
.legendcol{flex:1 1 220px; min-width:220px;}
.legrow{padding:9px 0; border-top:1px solid var(--line);}
.legrow:first-child{border-top:none; padding-top:0;}
.legrow .head{display:flex; justify-content:space-between; align-items:center; gap:8px;}
.legrow .name{font-weight:700; font-size:.92rem; display:flex; align-items:center; gap:8px;}
.legrow .pctval{font-family:'IBM Plex Mono'; font-weight:700; font-size:.88rem;}
.bandchip{font-size:.64rem; text-transform:uppercase; letter-spacing:.05em; padding:2px 8px; border-radius:99px; font-weight:700; font-family:'IBM Plex Mono';}
.bandchip.developing{background:#ECEDEE; color:var(--steel);}
.bandchip.moderate{background:#F7E9D2; color:#8C6219;}
.bandchip.high{background:#F3DAD6; color:var(--red-deep);}
.legrow .blurb{font-size:.84rem; color:var(--steel); margin-top:4px;}
.note{font-size:.83rem; color:var(--steel); background:var(--paper); border-radius:8px; padding:10px 13px; margin-top:14px;}

/* section 3 advice */
.advice-recap{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px;}
.recapchip{display:flex; align-items:center; gap:8px; background:var(--ink); color:#fff; border-radius:99px; padding:8px 16px; font-size:.85rem; font-weight:600;}
.recapchip b{font-family:'Big Shoulders Display'; color:var(--gold); font-weight:800;}
.tips{margin-top:6px;}
.tips li{margin:8px 0 8px 22px; font-size:.93rem;}
.roadmap{display:flex; align-items:flex-start; gap:0; margin:26px 0 6px; overflow-x:auto; padding:6px 0 10px;}
.roadmap .stop{flex:1 1 0; min-width:118px; text-align:center; position:relative; padding-top:24px;}
.roadmap .stop::before{content:""; position:absolute; top:9px; left:0; right:0; height:2px; background:var(--line);}
.roadmap .stop:first-child::before{left:50%;}
.roadmap .stop:last-child::before{right:50%;}
.roadmap .stop .pin3{width:17px; height:17px; border-radius:50%; background:var(--card); border:2.5px solid var(--silver); margin:0 auto; position:relative; z-index:1;}
.roadmap .stop.hi::before{background:var(--red);}
.roadmap .stop.hi .pin3{background:var(--red); border-color:var(--red); box-shadow:0 0 0 4px rgba(156,42,31,.18);}
.roadmap .stop b{display:block; font-family:'Big Shoulders Display'; font-weight:700; font-size:.86rem; margin-top:9px;}
.roadmap .stop span{font-size:.72rem; color:var(--steel);}

/* section 4 passport */
.passport{background:var(--ink); color:#fff; border-radius:18px; padding:30px 28px; margin-top:8px; position:relative; overflow:hidden;}
.passport::before{content:""; position:absolute; right:-60px; top:-60px; width:220px; height:220px; border-radius:50%; background:radial-gradient(circle,rgba(201,138,44,.25),transparent 70%);}
.passport .ptitle{font-family:'IBM Plex Mono'; text-transform:uppercase; letter-spacing:.14em; font-size:.7rem; color:var(--gold); font-weight:700;}
.passport h2{font-size:clamp(1.8rem,5vw,2.6rem); font-weight:900; margin:.25em 0 .3em; color:#fff;}
.passport .stats{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:16px; margin-top:20px;}
.passport .stat{background:rgba(255,255,255,.07); border-radius:10px; padding:12px 14px;}
.passport .stat .k{font-family:'IBM Plex Mono'; font-size:.66rem; text-transform:uppercase; letter-spacing:.08em; color:#C7CBCF;}
.passport .stat .v{font-family:'Big Shoulders Display'; font-size:1.2rem; font-weight:800; color:#fff; margin-top:3px;}
.passport p.narr{font-size:.96rem; color:#E7E9EB; margin-top:18px; max-width:70ch; position:relative; z-index:1;}

.nextcard{margin-top:20px;}
.printrow{display:flex; gap:12px; margin:26px 0; flex-wrap:wrap;}

@media print{
  .topbar,.printrow,.subnav{display:none !important;}
  body{background:#fff;}
  .rcard,.domain-card,.passport{box-shadow:none; break-inside:avoid;}
}
@media(max-width:680px){
  .chartrow{flex-direction:column;}
  .chartbox svg{max-width:100%; height:auto;}
}

</style>
</head>
<body>

<div class="topbar" id="topbar" style="display:none;">

/* ============================================================
   CHART BUILDERS — plain inline SVG, no external library.
   Each returns an HTML string ready for innerHTML.
   Colors are passed as literal hex (not CSS var()) so the charts
   render correctly even in contexts with restricted style cascading.
============================================================ */
const CHART_COLOR = { red:"#9C2A1F", slate:"#3B5166", gold:"#C98A2C", sage:"#5C7A5E", plum:"#7A4866", steel:"#6E7075" };
function donutChart(items, size = 176, thickness = 28) {
  const total = items.reduce((a, b) => a + b.value, 0) || 1;
  const r = (size - thickness) / 2, C = 2 * Math.PI * r, cx = size / 2, cy = size / 2;
  let acc = 0, circles = "";
  items.forEach(it => {
    const frac = it.value / total, len = frac * C;
    const rotate = -90 + (acc / total) * 360;
    circles += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${it.color}" stroke-width="${thickness}" stroke-dasharray="${len} ${C - len}" transform="rotate(${rotate} ${cx} ${cy})"/>`;
    acc += it.value;
  });
  if (items.length === 0) circles = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--line)" stroke-width="${thickness}"/>`;
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" role="img" aria-label="proportion chart">${circles}</svg>`;
}

function columnChart(items, width = 360, height = 200) {
  const padT = 26, padB = 34, padX = 14;
  const innerW = width - padX * 2, innerH = height - padT - padB;
  const n = items.length, gap = 14, barW = (innerW - gap * (n - 1)) / n;
  let bars = "";
  items.forEach((it, i) => {
    const h = Math.max(2, (it.pct / 100) * innerH);
    const x = padX + i * (barW + gap), y = padT + innerH - h;
    bars += `
      <rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="6" fill="${it.color}"/>
      <text x="${x + barW / 2}" y="${y - 8}" text-anchor="middle" class="cv">${it.pct}%</text>
      <text x="${x + barW / 2}" y="${height - 10}" text-anchor="middle" class="cl">${it.label}</text>`;
  });
  return `<svg viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" role="img" aria-label="bar chart">
    <line x1="${padX}" y1="${padT + innerH}" x2="${width - padX}" y2="${padT + innerH}" stroke="var(--line)" stroke-width="1"/>
    ${bars}
    <style>.cv{font:700 11px 'IBM Plex Mono',monospace; fill:var(--ink);} .cl{font:600 10px 'Source Sans 3',sans-serif; fill:var(--steel);}</style>
  </svg>`;
}

function lineChart(items, width = 360, height = 190, color = CHART_COLOR.slate) {
  const padT = 26, padB = 30, padX = 28;
  const innerW = width - padX * 2, innerH = height - padT - padB;
  const n = items.length;
  const pts = items.map((it, i) => {
    const x = padX + (n === 1 ? innerW / 2 : (i / (n - 1)) * innerW);
    const y = padT + innerH - (it.pct / 100) * innerH;
    return { x, y, it };
  });
  const lineStr = pts.map(p => `${p.x},${p.y}`).join(" ");
  const areaStr = `${padX},${padT + innerH} ${lineStr} ${padX + innerW},${padT + innerH}`;
  let dots = "";
  pts.forEach(p => {
    dots += `
      <circle cx="${p.x}" cy="${p.y}" r="5.5" fill="${color}" stroke="#fff" stroke-width="2"/>
      <text x="${p.x}" y="${p.y - 13}" text-anchor="middle" class="cv">${p.it.pct}%</text>
      <text x="${p.x}" y="${height - 8}" text-anchor="middle" class="cl">${p.it.label}</text>`;
  });
  return `<svg viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" role="img" aria-label="line chart">
    <line x1="${padX}" y1="${padT + innerH}" x2="${width - padX}" y2="${padT + innerH}" stroke="var(--line)" stroke-width="1"/>
    <polygon points="${areaStr}" fill="${color}" opacity="0.12"/>
    <polyline points="${lineStr}" fill="none" stroke="${color}" stroke-width="2.5"/>
    ${dots}
    <style>.cv{font:700 11px 'IBM Plex Mono',monospace; fill:var(--ink);} .cl{font:600 10px 'Source Sans 3',sans-serif; fill:var(--steel);}</style>
  </svg>`;
}

function twinBars(longPct, shortPct, width = 360, height = 110) {
  const padX = 110, barH = 26, gapY = 18, top = 16;
  const innerW = width - padX - 50;
  const rows = [
    {label:"Long-term", pct:longPct, color:CHART_COLOR.red},
    {label:"Short-term", pct:shortPct, color:CHART_COLOR.slate}
  ];
  let out = "";
  rows.forEach((r, i) => {
    const y = top + i * (barH + gapY);
    const w = Math.max(3, (r.pct / 100) * innerW);
    out += `
      <text x="0" y="${y + barH/2 + 4}" class="rl">${r.label}</text>
      <rect x="${padX}" y="${y}" width="${innerW}" height="${barH}" rx="13" fill="#F2F4F6"/>
      <rect x="${padX}" y="${y}" width="${w}" height="${barH}" rx="13" fill="${r.color}"/>
      <text x="${padX + innerW + 12}" y="${y + barH/2 + 4}" class="rv">${r.pct}%</text>`;

  return `<svg viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" role="img" aria-label="long vs short term orientation">

    <style>.rl{font:700 12px 'Source Sans 3',sans-serif; fill:#211B19;} .rv{font:700 12px 'IBM Plex Mono',monospace; fill:#211B19;}</style>
  </svg>`;
}

function hBarChart(items, width = 360) {
  // items: [{label, pct, color}]  — generic horizontal bar chart (any row count)
  const padX = 150, barH = 22, gapY = 14, top = 6;
  const innerW = width - padX - 50;
  const height = top * 2 + items.length * (barH + gapY) - gapY;

      <text x="${padX + innerW + 12}" y="${y + barH/2 + 4}" class="rv">${r.pct}%</text>`;
  });
  return `<svg viewBox="0 0 ${width} ${height}" width="${width}" height="${height}" role="img" aria-label="bar chart">
    ${out}
    <style>.rl{font:600 11.5px 'Source Sans 3',sans-serif; fill:#211B19;} .rv{font:700 11.5px 'IBM Plex Mono',monospace; fill:#211B19;}</style>
  </svg>`;
}

}
function facetAccuracy(facet, answers) {
  const its = ITEMS.filter(it => it.section === "aptitude" && it.facet === facet);
  const correct = its.filter(it => answers[it.item_id] === it.answer_key_index).length;
  return correct / its.length;
}

function computeScores(answers) {
  const S = {};
  ["R","I","A","S","E","C"].forEach(f => S[f] = norm5(facetMean("interest", f, answers)));
  ["O","Cn","Ex","Ag","ES"].forEach(f => S[f] = norm5(facetMean("personality", f, answers)));
  ["OC","SE","CO","ST"].forEach(f => S[f] = norm5(facetMean("values", f, answers)));
  S.vark = {};
  ["V","A","Rd","K"].forEach(f => S.vark[f] = norm5(facetMean("learning_style", f, answers)));
  S.goalLong = norm5(facetMean("goal_orientation", "L", answers));
  S.goalShort = norm5(facetMean("goal_orientation", "S", answers));
  ["Mech","Log","Verb","Spat","Num","Voc"].forEach(f => S[f] = facetAccuracy(f, answers));
  return S;
}

function clusterMatches(S) {
  return CLUSTERS.map(cl => {
    const w = cl.weights;
    const comp = (fs) => { let n=0,d=0; fs.forEach(f=>{n+=w[f]*S[f]; d+=w[f];}); return d>0? n/d : 0; };
    const fitI = comp(["R","I","A","S","E","C"]);
    const fitP = comp(["O","Cn","Ex","Ag","ES"]);
    const fitV = comp(["OC","SE","CO","ST"]);
    const fitA = comp(["Mech","Log","Verb","Spat","Num","Voc"]);
    const match = 0.35*fitI + 0.30*fitA + 0.20*fitP + 0.15*fitV;
    return { cl, match, fitI, fitP, fitV, fitA };
  }).sort((a,b) => b.match - a.match);
}

function semSubMatches(S) {
  return SEM_SUB.map(sc => {
    const w = sc.weights;
    const comp = (fs) => { let n=0,d=0; fs.forEach(f=>{n+=w[f]*S[f]; d+=w[f];}); return d>0? n/d : 0; };
    const match = SEM_BLEND.interest*comp(["R","I","A","S","E","C"])
                + SEM_BLEND.aptitude*comp(["Mech","Log","Verb","Spat","Num","Voc"])
                + SEM_BLEND.personality*comp(["O","Cn","Ex","Ag","ES"])
                + SEM_BLEND.values*comp(["OC","SE","CO","ST"]);
    return { sc, match };
  }).sort((a,b) => b.match - a.match);
}

function renderSection(sectionKey){
  const meta = SECTION_META[sectionKey];
  const its = itemsFor(sectionKey);
  let html = `<div class="screen active">
    <div class="sec-head">
      <div class="eyebrow">${meta.eyebrow}</div>
      <h2>${meta.title}</h2>
      <p>${meta.desc}</p>
    </div>`;

  its.forEach((it, qi) => {
    const val = answers[it.item_id];
    if (it.response === "likert5") {
      const labels = ["Strongly disagree","Disagree","Neutral","Agree","Strongly agree"];
      html += `<div class="q" data-item="${it.item_id}">
        <div class="qtext"><span class="qnum">${qi+1}.</span>${esc(it.text)}</div>
        <div class="likert">${labels.map((L,vi)=>`
          <label class="${val===vi+1?'sel':''}"><input type="radio" name="${it.item_id}" value="${vi+1}" ${val===vi+1?'checked':''}>${L}</label>`).join("")}
        </div></div>`;
    } else {
      const stemImg = it.image ? `<div class="qimg"><img src="${it.image}" alt="question figure"></div>` : "";
      const optImgs = it.option_images;
      const letters = "abcde";
      html += `<div class="q" data-item="${it.item_id}">
        <div class="qtext qpre"><span class="qnum">${qi+1}.</span>${esc(it.text)}</div>
        ${stemImg}
        <div class="opts">${it.options.map((opt,oi)=>`
          <label class="${val===oi?'sel':''}"><input type="radio" name="${it.item_id}" value="${oi}" ${val===oi?'checked':''}><span class="letter">${letters[oi]})</span><span>${optImgs?`<img class="optimg" src="${optImgs[oi]}" alt="option ${letters[oi]}">`:""}${esc(opt)}</span></label>`).join("")}
        </div></div>`;
    }
  });

  const isLast = sectionKey === "aptitude";
  html += `<p class="errnote" id="secErr">Please answer every question — the unanswered ones are highlighted above.</p>
    <div class="navrow">
      <button class="btn btn-ghost" id="backBtn">${cur===1?"Back to start":"Previous leg"}</button>
      <button class="btn ${isLast?'btn-accent':'btn-primary'}" id="nextBtn">${isLast?"Finish & see my career map":"Next leg"}</button>
    </div></div>`;
  app.innerHTML = html;

  app.querySelectorAll(".q").forEach(qEl => {
    const itemId = qEl.dataset.item;
    qEl.querySelectorAll("input[type=radio]").forEach(inp => {
      inp.addEventListener("change", () => {
        answers[itemId] = +inp.value;
        qEl.querySelectorAll("label").forEach(l => l.classList.remove("sel"));
        inp.closest("label").classList.add("sel");
        qEl.classList.remove("unanswered-flag");
        persistProgress();
        renderRail();
      });
    });
  });
  document.getElementById("backBtn").addEventListener("click", () => show(cur-1));
  document.getElementById("nextBtn").addEventListener("click", () => {
    const missing = its.filter(it => answers[it.item_id] == null);
    if (missing.length) {
      document.getElementById("secErr").classList.add("show");
      app.querySelectorAll(".q").forEach(qEl => {
        qEl.classList.toggle("unanswered-flag", answers[qEl.dataset.item] == null);
      });
      const first = app.querySelector(".q.unanswered-flag");
      if (first) first.scrollIntoView({behavior:"smooth", block:"center"});
      return;
    }
    if (isLast) {
      const finalPayload = {
        test_version: APP_CONFIG.TEST_VERSION, student, answers,
        started_at: startedAt, completed_at: new Date().toISOString()
      };
      localSave(APP_CONFIG.LOCAL_STORAGE_KEY, {...finalPayload, completed:true, savedAt:new Date().toISOString()});
      remoteSave(finalPayload);
    }
    show(cur+1);
  });
}

  const goalLegend = `
    <div class="legrow"><div class="head"><span class="name"><span class="swatch" style="background:${CHART_COLOR.red}"></span>Long-term orientation</span><span class="pctval">${longPct}%</span></div><div class="blurb">Comfort with investing several more years in education before starting a career.</div></div>
    <div class="legrow"><div class="head"><span class="name"><span class="swatch" style="background:${CHART_COLOR.slate}"></span>Short-term orientation</span><span class="pctval">${shortPct}%</span></div><div class="blurb">Preference for entering work or skill-based training sooner.</div></div>`;
  const goalCard = domainCard("Goal Orientation",
    "How you're currently weighing more years of study against starting work sooner. These are independent scores, not two ends of one scale.",
    twinBars(longPct, shortPct, 340, 110), goalLegend);

  const leg2 = `
  <section class="leg" id="leg2">
    <span class="legtag"><span class="pinmini"></span>Section 2 of 4</span>
    <h2>Your Profile, In Detail</h2>
    <p class="lede">Six results from the assessment, each with its own chart. Bands (developing / moderate / high) describe where you stand relative to typical responses, not pass/fail marks.</p>
    ${interestsCard}${personCard}${valuesCard}${aptCard}${varkCard}${goalCard}
  </section>`;

  // ---------- LEG 3 ----------
  const varkName = (f)=>INTERP.learning_style[f].name;
  const learnLabel = varkMulti ? `${varkName(varkRank[0][0])} + ${varkName(varkRank[1][0])} (multimodal)` : varkName(varkRank[0][0]);
  const tipFacets = varkMulti ? [varkRank[0][0], varkRank[1][0]] : [varkRank[0][0]];
  const tips = tipFacets.flatMap(f => INTERP.learning_style[f].tips);
  const goalMeta = INTERP.goal_orientation[goalKey];

  const roadStops = [
    {b:"Class 8–10", s:"Build basics", k:"base"},
    {b:"Stream choice", s:"Class 11 onward", k:"stream"},
    {b:"Entrance prep", s:"If required", k:"entrance"},
    {b:"Degree / course", s:"College years", k:"degree"},
    {b:"Internship", s:"Real experience", k:"intern"},
    {b:"Career", s:"Your destination", k:"career"}
  ];
  const hiSet = {long_term:["stream","entrance","degree"], short_term:["stream","intern","career"], balanced:["stream","degree","intern"]}[goalKey];

  const leg3 = `
  <section class="leg" id="leg3">
    <span class="legtag"><span class="pinmini"></span>Section 3 of 4</span>
    <h2>Your Direction: Study &amp; Pathway Advice</h2>
    <p class="lede">Turning your learning style and goal orientation into concrete next steps.</p>
    <div class="rcard">
      <div class="advice-recap">
        <span class="recapchip">Learning style <b>${esc(learnLabel)}</b></span>
        <span class="recapchip">Goal orientation <b>${esc(goalMeta.name)}</b></span>
      </div>
      <h3>How to study, based on how you learn</h3>
      <ul class="tips">${tips.map(t=>`<li>${esc(t)}</li>`).join("")}</ul>
      <h3 style="margin-top:22px;">Your pathway approach</h3>
      <p>${esc(goalMeta.text)}</p>
      <h3 style="margin-top:22px;">A general route from where you are now</h3>
      <div class="roadmap">${roadStops.map(st=>`<div class="stop ${hiSet.includes(st.k)?'hi':''}"><div class="pin3"></div><b>${st.b}</b><span>${st.s}</span></div>`).join("")}</div>
      <div class="note">Highlighted stops are where your current goal orientation matters most — this is a general route, not a fixed plan. Talk it through with a teacher, counsellor or parent before locking in big decisions.</div>
    </div>
  </section>`;

  // ---------- LEG 4 ----------
  const top1 = top5[0];
  const topValue = INTERP.values[valRank[0][0]].name;
  const topTrait = INTERP.personality[ocRank[0][0]].name;
  const topApt1 = INTERP.aptitude[aptRank[0][0]].name, topApt2 = INTERP.aptitude[aptRank[1][0]].name;
  const narrative = `${esc(student.name)} shows a ${hollandCode} interest pattern, which combined with ${esc(topTrait.toLowerCase())} and a strong pull toward ${esc(topValue.toLowerCase())} points most clearly toward <b>${esc(top1.cl.name)}</b> (${pct(top1.match)}% match). `
    + `Aptitude-wise, ${esc(student.name)}'s strongest results are in ${esc(topApt1)} and ${esc(topApt2)}, which support that direction. `
    + `As a ${esc(learnLabel.toLowerCase())} learner with a ${esc(goalMeta.name.toLowerCase())} approach to the path ahead, the study tips and route in Section 3 are the most relevant starting point.`;

  const leg4 = `
  <section class="leg" id="leg4">
    <span class="legtag"><span class="pinmini"></span>Section 4 of 4</span>
    <h2>Your Complete Career Map</h2>
    <p class="lede">Everything above, brought together into one summary.</p>
    <div class="passport">
      <div class="ptitle">Career Compass · Comprehensive Report</div>
      <h2>${esc(student.name)}</h2>
      <div class="stats">
        <div class="stat"><div class="k">Holland Code</div><div class="v">${hollandCode}</div></div>
        <div class="stat"><div class="k">Top Cluster</div><div class="v">${esc(top1.cl.name)}</div></div>
        <div class="stat"><div class="k">Match</div><div class="v">${pct(top1.match)}%</div></div>
        <div class="stat"><div class="k">Top Value</div><div class="v">${esc(topValue)}</div></div>
        <div class="stat"><div class="k">Top Trait</div><div class="v">${esc(topTrait)}</div></div>
        <div class="stat"><div class="k">Learning Style</div><div class="v">${esc(learnLabel)}</div></div>
        <div class="stat"><div class="k">Goal Orientation</div><div class="v">${esc(goalMeta.name)}</div></div>
      </div>
      <p class="narr">${narrative}</p>
    </div>
    <div class="rcard nextcard">
      <h3>What to do next</h3>
      <ul class="tips">
        <li>Read through your top 5 clusters in Section 1 with a parent, teacher or counsellor.</li>
        <li>Shortlist 2–3 clusters and look up their stream/subject requirements for your class.</li>
        <li>Use the study tips in Section 3 for the next exam cycle.</li>
        <li>Retake this assessment in 6–12 months — interests and skills develop, especially in these years.</li>
      </ul>
    </div>
    <div class="note">${esc(D.match_note)} ${esc(D.retest_note)}</div>
    <div class="printrow">
      <button class="btn btn-primary" id="printBtn">Print / Save as PDF</button>
      <button class="btn btn-outline" id="downloadBtn">Download my answers (JSON)</button>
      <button class="btn btn-ghost" id="retakeBtn">Retake assessment</button>
    </div>
  </section>`;

  app.innerHTML = `
  <div class="screen active">
    <div class="report-head">
      <div class="eyebrow">Career Compass · Final Report</div>
      <h2>${esc(student.name)}'s Career Map</h2>
      <div class="report-meta">${esc(student.cls)}${student.school? " · "+esc(student.school):""} · ${ITEMS.length} questions completed</div>
    </div>
    <nav class="subnav">
      <a href="#leg1">1 · Clusters</a><a href="#leg2">2 · Your Profile</a><a href="#leg3">3 · Direction</a><a href="#leg4">4 · Summary</a>
    </nav>
    ${leg1}${leg2}${leg3}${leg4}
  </div>`;

  document.getElementById("printBtn").addEventListener("click", () => window.print());
  document.getElementById("downloadBtn").addEventListener("click", () => {
    downloadJSON(`career-compass-${student.name.replace(/\s+/g,"_")}.json`, {
      test_version: APP_CONFIG.TEST_VERSION, student, started_at: startedAt, completed_at: new Date().toISOString(),
      answers, facet_scores: S,
      cluster_ranking: ranked.map(r=>({cluster_id:r.cl.cluster_id, name:r.cl.name, match:pct(r.match)})),
      sem_subcluster_ranking: ranked[0] && top5.some(r=>r.cl.cluster_id==="SEM") ? semSubMatches(S).map(s=>({name:s.sc.name, match:pct(s.match)})) : undefined
    });
  });
  document.getElementById("retakeBtn").addEventListener("click", () => {
    if (!confirm("This clears your saved answers on this device and starts over. Continue?")) return;
    localClear(APP_CONFIG.LOCAL_STORAGE_KEY); answers = {}; student = {name:"",cls:"",school:""}; startedAt = null;
    show(0);
  });
}


show(0);
</script>
</body>
</html>
